# App root = Apps/Web/arellsstore
#
# Do NOT install Volta/nvm in CI — brittle under Amplify (curl|bash, PATH, exit codes).
# Set Node in Amplify Console → Hosting → Environment variables:
#   NODE_VERSION = 20
# Amplify applies this before these commands run. (.nvmrc 20.20.1 matches Volta.)
#
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - |
          set -eo pipefail
          echo "🧹 Clearing build cache..."
          rm -rf .next node_modules/.cache dist
          echo "Node/npm (from Amplify image + NODE_VERSION):"
          node -v || true
          npm -v || true
          echo "📌 Expect NODE_VERSION=20 in Amplify env if build requires Node 20."
          npm install -g yarn@1.22.22
          yarn -v
          echo "📦 Installing dependencies..."
          yarn install --frozen-lockfile
    build:
      commands:
        - |
          set -eo pipefail
          echo "🚀 Building Next.js app..."
          yarn run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths: []
