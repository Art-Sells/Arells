# Monorepo: build spec at repo root (clone Art-Sells/Arells). Points at the Next.js app.
# Keep preBuild/build scripts in sync with Apps/Web/arellsstore/amplify.yml.
version: 1
applications:
  - appRoot: Apps/Web/arellsstore
    frontend:
      phases:
        preBuild:
          commands:
            - |
              set -euo pipefail
              echo "🧹 Clearing build cache..."
              rm -rf .next node_modules/.cache dist
              echo "🔧 Node 20 + Yarn (nvm)..."
              export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
              if [ -s "$NVM_DIR/nvm.sh" ]; then
                . "$NVM_DIR/nvm.sh"
              elif [ -s "/usr/local/nvm/nvm.sh" ]; then
                export NVM_DIR="/usr/local/nvm"
                . "/usr/local/nvm/nvm.sh"
              else
                echo "nvm.sh not found; set Node 20 in Amplify build settings or use an image with nvm."
                exit 1
              fi
              nvm install 20.20.1
              nvm use 20.20.1
              node -v
              npm install -g yarn@1.22.22
              yarn -v
              echo "📦 Installing dependencies..."
              yarn install --frozen-lockfile
        build:
          commands:
            - |
              set -euo pipefail
              export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
              if [ -s "$NVM_DIR/nvm.sh" ]; then
                . "$NVM_DIR/nvm.sh"
              elif [ -s "/usr/local/nvm/nvm.sh" ]; then
                export NVM_DIR="/usr/local/nvm"
                . "/usr/local/nvm/nvm.sh"
              fi
              nvm use 20.20.1
              echo "🚀 Building Next.js app..."
              yarn run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths: []
