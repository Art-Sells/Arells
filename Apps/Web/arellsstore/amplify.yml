# App root = Apps/Web/arellsstore. Single shell per phase so PATH persists.
# Many Amplify images do NOT ship nvm — install it when missing (Volta was unreliable too).
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - |
          set -eo pipefail
          echo "🧹 Clearing build cache..."
          rm -rf .next node_modules/.cache dist
          echo "🔧 Node 20 + Yarn..."
          export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
          if [ ! -s "$NVM_DIR/nvm.sh" ]; then
            echo "nvm not found — installing nvm..."
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
          fi
          # shellcheck disable=SC1090
          . "$NVM_DIR/nvm.sh"
          nvm install 20.20.1
          nvm use 20.20.1
          node -v
          npm install -g yarn@1.22.22
          yarn -v
          echo "📦 Installing dependencies..."
          yarn install --frozen-lockfile
    build:
      commands:
        - |
          set -eo pipefail
          export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
          # shellcheck disable=SC1090
          . "$NVM_DIR/nvm.sh"
          nvm use 20.20.1
          echo "🚀 Building Next.js app..."
          yarn run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths: []
