# Repository root. App: Apps/Web/arellsstore
# If Amplify uses THIS file, appRoot below must match the Next app folder.
# Global yarn install is avoided (npx instead) — see arellsstore/amplify.yml.
#
version: 1
applications:
  - appRoot: Apps/Web/arellsstore
    frontend:
      phases:
        preBuild:
          commands:
            - |
              set -eo pipefail
              echo "🧹 Clearing build cache..."
              rm -rf .next node_modules/.cache dist
              echo "📂 PWD=$(pwd)"
              ls -la
              if [ ! -f package.json ]; then
                echo "ERROR: package.json missing — check App root Apps/Web/arellsstore"
                exit 1
              fi
              node -v
              npm -v
              echo "📦 yarn via npx..."
              npx --yes yarn@1.22.22 --version
              npx --yes yarn@1.22.22 install --frozen-lockfile
        build:
          commands:
            - |
              set -eo pipefail
              npx --yes yarn@1.22.22 run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
