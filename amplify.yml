# Repo-root spec (monorepo). Amplify cds into appRoot before phases when this file is used.
#
version: 1
applications:
  - appRoot: Apps/Web/arellsstore
    frontend:
      phases:
        preBuild:
          commands:
            - |
              set -eo pipefail
              if [ -f package.json ]; then
                echo "📂 $(pwd)"
              elif [ -f Apps/Web/arellsstore/package.json ]; then
                cd Apps/Web/arellsstore
                echo "📂 cd → $(pwd)"
              else
                echo "ERROR: no package.json" && ls -la && exit 1
              fi
              rm -rf .next node_modules/.cache dist
              node -v && npm -v
              npx --yes yarn@1.22.22 --version
              npx --yes yarn@1.22.22 install --frozen-lockfile
        build:
          commands:
            - |
              set -eo pipefail
              if [ -f package.json ]; then
                :
              elif [ -f Apps/Web/arellsstore/package.json ]; then
                cd Apps/Web/arellsstore
              else
                exit 1
              fi
              npx --yes yarn@1.22.22 run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
