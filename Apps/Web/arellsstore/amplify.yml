# App root in Amplify MUST be: Apps/Web/arellsstore (monorepo).
# Optional env: NODE_VERSION=20
#
# Global `npm install -g yarn` often fails on Amplify (EACCES / read-only global prefix).
# Use npx to run Yarn 1.x with no global install.
#
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - |
          set -eo pipefail
          echo "🧹 Clearing build cache..."
          rm -rf .next node_modules/.cache dist
          echo "📂 PWD=$(pwd)"
          echo "📂 Top-level files:" && ls -la
          if [ ! -f package.json ]; then
            echo "ERROR: package.json not here. In Amplify Console set App build settings → App root to: Apps/Web/arellsstore"
            exit 1
          fi
          echo "Node:" && node -v
          echo "npm:" && npm -v
          echo "📦 Install deps with Yarn 1.x via npx (no global yarn)..."
          npx --yes yarn@1.22.22 --version
          npx --yes yarn@1.22.22 install --frozen-lockfile
    build:
      commands:
        - |
          set -eo pipefail
          echo "🚀 Building Next.js app..."
          npx --yes yarn@1.22.22 run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
