# Monorepo root — app lives at Apps/Web/arellsstore
#
# Set in Amplify Console → Environment variables: NODE_VERSION = 20
# Avoid installing nvm/Volta in CI (fragile on Amplify).
#
version: 1
applications:
  - appRoot: Apps/Web/arellsstore
    frontend:
      phases:
        preBuild:
          commands:
            - |
              set -eo pipefail
              echo "🧹 Clearing build cache..."
              rm -rf .next node_modules/.cache dist
              echo "Node/npm (from Amplify image + NODE_VERSION):"
              node -v || true
              npm -v || true
              npm install -g yarn@1.22.22
              yarn -v
              echo "📦 Installing dependencies..."
              yarn install --frozen-lockfile
        build:
          commands:
            - |
              set -eo pipefail
              echo "🚀 Building Next.js app..."
              yarn run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths: []
